[workspace]
members = [
    "crates/sdk/*", 
    "crates/core/*", 
    "crates/cmd/*", 
    "crates/tool/*", 
    "crates/sqlite/*", 
    "crates/sqlite-wasi/*", 
]
exclude = ["crates/sdk/scan-type-wasi"]
resolver = "3"

[workspace.dependencies]
anyhow = "1.0"
thiserror = "2.0.12"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
clap = { version = "4.5.37", features = ["derive"] }
wit-bindgen = "0.42"
