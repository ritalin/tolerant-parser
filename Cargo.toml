[workspace]
members = [
#    "crates/sdk/*", 
    "crates/core/*", 
    "crates/cmd/*", 
    "crates/tool/*", 
    "crates/sqlite/*", 
]
exclude = ["crates/cmd/print_parse_result"]
resolver = "3"

[workspace.dependencies]
anyhow = "1.0"
thiserror = "2.0.12"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
clap = { version = "4.5.37", features = ["derive"] }
